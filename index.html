<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#000;color:#fff;font-family:Arial;margin:0}
h1{text-align:center}

.screen{display:none;padding:15px}
.active{display:block}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}
.day{
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
}
.day.hasData{background:#0f5c6e}

button{width:100%;padding:15px;margin-top:10px;border:none;border-radius:10px}
.green{background:#00c853}
.blue{background:#2962ff}
.orange{background:#ff9800}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#111;
}
.nav div{
flex:1;
text-align:center;
padding:10px;
}

input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
</style>
</head>

<body>

<h1>🔥 Hell Work</h1>

<!-- HOME -->
<div id="home" class="screen active">

<select id="mes">
<option>Janeiro</option>
</select>

<h2>💰 Total: €<span id="total">0</span></h2>

<div class="calendar" id="calendar"></div>

<button class="blue" onclick="exportPDF()">📄 Exportar PDF</button>

</div>

<!-- ADD -->
<div id="add" class="screen">

<input id="local" placeholder="Local">

<label><input type="checkbox" id="k"> Kasseien</label>
<input id="k_m" placeholder="metros">

<label><input type="checkbox" id="p"> Platines</label>
<input id="p_m" placeholder="metros">

<label><input type="checkbox" id="m"> Mosaic</label>
<input id="m_m" placeholder="metros">

<label><input type="checkbox" id="j"> Juntas</label>

<label><input type="checkbox" id="d"> Day</label>

<label><input type="checkbox" id="md"> Meio dia</label>

<button class="green" onclick="guardar()">Guardar</button>

</div>

<!-- PREÇOS -->
<div id="prices" class="screen">

Kasseien <input id="pk" value="6.5"><br>
Platines <input id="pp" value="7.5"><br>
Mosaic <input id="pm" value="9"><br>
Juntas <input id="pj" value="49"><br>
Day <input id="pd" value="220"><br>
Meio dia <input id="pmd" value="110"><br>

<button class="orange" onclick="savePrices()">Guardar preços</button>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">📅</div>
<div onclick="show('add')">➕</div>
<div onclick="show('prices')">⚙️</div>
</div>

<script>

let selectedDay=null;
let data=JSON.parse(localStorage.getItem("dados")||"{}");
let prices=JSON.parse(localStorage.getItem("precos")||"{}");

/* TROCAR ECRÃ */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* CALENDARIO */
let cal=document.getElementById("calendar");

for(let i=1;i<=31;i++){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

if(data[i]) d.classList.add("hasData");

d.onclick=()=>{
selectedDay=i;
show("add");
};

cal.appendChild(d);
}

/* GUARDAR */
function guardar(){

if(!selectedDay)return alert("Escolhe um dia");

let total=0;

if(k.checked) total+=k_m.value*getP("k");
if(p.checked) total+=p_m.value*getP("p");
if(m.checked) total+=m_m.value*getP("m");
if(j.checked) total+=getP("j");
if(d.checked) total+=getP("d");
if(md.checked) total+=getP("md");

data[selectedDay]=total;

localStorage.setItem("dados",JSON.stringify(data));

location.reload();
}

/* PREÇOS */
function savePrices(){
prices={
k:pk.value,
p:pp.value,
m:pm.value,
j:pj.value,
d:pd.value,
md:pmd.value
};
localStorage.setItem("precos",JSON.stringify(prices));
alert("Guardado");
}

function getP(type){
return parseFloat(prices[type]||0);
}

/* TOTAL */
function calcTotal(){
let t=0;
for(let d in data){
t+=data[d];
}
document.getElementById("total").innerText=t.toFixed(2);
}
calcTotal();

/* PDF */
function exportPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let y=10;

for(let d in data){
doc.text(`Dia ${d} - €${data[d]}`,10,y);
y+=10;
}

doc.text(`Total: €${document.getElementById("total").innerText}`,10,y+10);

doc.save("trabalho.pdf");
}

</script>

</body>
</html>
