<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:15px;}
h2{text-align:center;}
select,input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;}
button{width:100%;padding:10px;margin-top:6px;border-radius:8px;border:none;font-weight:bold;}
.add{background:#00c853;}
.item{background:#444;}
.pdf{background:#2962ff;}
.settings{background:#ff9800;}
.del{background:#d50000;}
.card{background:#1c1c1c;padding:10px;margin-top:10px;border-radius:10px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.day{background:#222;padding:10px;text-align:center;border-radius:6px;cursor:pointer;}
.day.active{background:#00c853;}
.total{text-align:center;margin-top:10px;font-size:20px;}
</style>
</head>

<body>

<h2>🔥 Hell Work</h2>

<button class="settings" onclick="toggleSettings()">⚙️ Preços</button>

<div id="settings" style="display:none;">
<input id="kasseien" placeholder="Kasseien €/m">
<input id="platines" placeholder="Platines €/m">
<input id="mosaic" placeholder="Mosaic €/m">
<input id="juntas" placeholder="Juntas € (fixo)">
<input id="day" placeholder="Day €">
<input id="half" placeholder="Meio dia €">
<button onclick="savePrices()">Guardar</button>
</div>

<select id="mes" onchange="renderCalendar()">
<option>Janeiro</option><option>Fevereiro</option><option>Março</option>
<option>Abril</option><option>Maio</option><option>Junho</option>
<option>Julho</option><option>Agosto</option><option>Setembro</option>
<option>Outubro</option><option>Novembro</option><option>Dezembro</option>
</select>

<div class="calendar" id="calendar"></div>

<hr>

<h3 id="diaAtual">Seleciona um dia</h3>

<input id="local" placeholder="Local">

<select id="tipo">
<option>Kasseien</option>
<option>Platines</option>
<option>Mosaic</option>
<option>Juntas</option>
<option>Day</option>
<option>Meio dia</option>
</select>

<input id="metros" placeholder="Metros (se aplicável)">

<button class="item" onclick="addItem()">➕ Adicionar linha</button>

<div id="itens"></div>

<button class="add" onclick="guardar()">💾 Guardar</button>

<button class="pdf" onclick="exportPDF()">📄 PDF mês</button>

<div class="total">💰 Total mês: € <span id="total">0</span></div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || {};
let itens = [];
let diaSelecionado = null;

function getPrices(){
return JSON.parse(localStorage.getItem("prices"))||{
kasseien:7.5,platines:7.5,mosaic:9,juntas:20,day:220,half:110
};
}

function savePrices(){
let p={
kasseien:+kasseien.value||0,
platines:+platines.value||0,
mosaic:+mosaic.value||0,
juntas:+juntas.value||0,
day:+day.value||0,
half:+half.value||0
};
localStorage.setItem("prices",JSON.stringify(p));
alert("Guardado");
}

function toggleSettings(){
settings.style.display=settings.style.display==="none"?"block":"none";
}

function renderCalendar(){
let cal=document.getElementById("calendar");
cal.innerHTML="";
let mes=mesSelect();

for(let i=1;i<=31;i++){
let key=mes+"-"+i;
let div=document.createElement("div");
div.className="day";
div.innerText=i;

if(dados[key]) div.classList.add("active");

div.onclick=()=>selectDia(i);
cal.appendChild(div);
}
calcTotal();
}

function mesSelect(){return document.getElementById("mes").value;}

function selectDia(d){
diaSelecionado=d;
document.getElementById("diaAtual").innerText="Dia "+d;

let key=mesSelect()+"-"+d;

if(dados[key]){
itens=dados[key].itens;
local.value=dados[key].local;
}else{
itens=[];
local.value="";
}

renderItens();
}

function addItem(){
let tipo=document.getElementById("tipo").value;
let m=+document.getElementById("metros").value||0;
itens.push({tipo,metros:m});
renderItens();
}

function renderItens(){
itensDiv.innerHTML="";
itens.forEach((i,idx)=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML=`
${i.tipo} ${i.metros?i.metros+"m":""}
<button class="del" onclick="removeItem(${idx})">X</button>`;
itensDiv.appendChild(d);
});
}

function removeItem(i){
itens.splice(i,1);
renderItens();
}

function calcItem(i){
let p=getPrices();
if(i.tipo==="Kasseien") return i.metros*p.kasseien;
if(i.tipo==="Platines") return i.metros*p.platines;
if(i.tipo==="Mosaic") return i.metros*p.mosaic;
if(i.tipo==="Juntas") return p.juntas;
if(i.tipo==="Day") return p.day;
if(i.tipo==="Meio dia") return p.half;
return 0;
}

function guardar(){
if(!diaSelecionado) return alert("Escolhe um dia");

let key=mesSelect()+"-"+diaSelecionado;
dados[key]={local:local.value,itens};

localStorage.setItem("dados",JSON.stringify(dados));

renderCalendar();
alert("Guardado");
}

function calcTotal(){
let total=0;
let mes=mesSelect();

for(let k in dados){
if(k.startsWith(mes)){
dados[k].itens.forEach(i=>total+=calcItem(i));
}
}
document.getElementById("total").innerText=total.toFixed(2);
}

function exportPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
let y=10;
let mes=mesSelect();
let total=0;

for(let k in dados){
if(k.startsWith(mes)){
let d=dados[k];
let val=0;
d.itens.forEach(i=>val+=calcItem(i));
total+=val;

doc.text(k+" - "+d.local,10,y); y+=6;
doc.text(d.itens.map(i=>i.tipo+" "+(i.metros?i.metros+"m":"")).join(" | "),10,y); y+=6;
doc.text("€"+val.toFixed(2),10,y); y+=10;
}
}

doc.text("Total: €"+total.toFixed(2),10,y);
doc.save("hellwork.pdf");
}

renderCalendar();
</script>

</body>
</html>
