<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system;
    background:#000;
    color:#fff;
}

h1{
    text-align:center;
    margin-top:20px;
}

.container{
    padding:15px;
}

/* CALENDÁRIO */
.calendar{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:8px;
    margin-top:20px;
}

.day{
    background:#222;
    padding:15px;
    text-align:center;
    border-radius:10px;
}

.active{
    background:#00bcd4;
}

.filled{
    background:#006064;
}

/* BOTÕES */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
}

.add{
    background:#00c853;
}

.pdf{
    background:#2962ff;
}

/* FORM */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:5px;
}

.section{
    margin-top:15px;
}
</style>
</head>

<body>

<h1>🔥 Hell Work</h1>

<div class="container">

<select id="month">
<option>Janeiro</option>
<option>Fevereiro</option>
<option>Março</option>
<option>Abril</option>
<option>Maio</option>
<option>Junho</option>
<option>Julho</option>
<option>Agosto</option>
<option>Setembro</option>
<option>Outubro</option>
<option>Novembro</option>
<option>Dezembro</option>
</select>

<h2>💰 Total: € <span id="total">0</span></h2>

<div class="calendar" id="calendar"></div>

<!-- FORM -->
<div class="section">
<input placeholder="Local" id="local">

<label><input type="checkbox" id="kasseien"> Kasseien</label>
<input placeholder="metros" id="kasseien_m">

<label><input type="checkbox" id="platines"> Platines</label>
<input placeholder="metros" id="platines_m">

<label><input type="checkbox" id="mosaic"> Mosaic</label>
<input placeholder="metros" id="mosaic_m">

<label><input type="checkbox" id="juntas"> Juntas</label>
<input placeholder="metros" id="juntas_m">

<label><input type="checkbox" id="day"> Day</label>
<label><input type="checkbox" id="meio"> Meio dia</label>

<button class="add" onclick="saveDay()">+ Adicionar</button>
<button class="pdf" onclick="exportPDF()">📄 Exportar PDF</button>

</div>

</div>

<script>

let selectedDay = null;
let data = JSON.parse(localStorage.getItem("workData")) || {};

// PREÇOS BASE
let prices = {
    kasseien: 6.5,
    platines: 7.5,
    mosaic: 9,
    juntas: 1,
    day: 220,
    meio: 110
};

// CALENDÁRIO
function generateCalendar(){
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let i=1;i<=31;i++){
        let d = document.createElement("div");
        d.className = "day";
        d.innerText = i;

        if(data[i]) d.classList.add("filled");

        d.onclick = ()=>{
            selectedDay = i;
            document.querySelectorAll(".day").forEach(e=>e.classList.remove("active"));
            d.classList.add("active");
        };

        cal.appendChild(d);
    }
}

// GUARDAR DIA
function saveDay(){
    if(!selectedDay) return alert("Escolhe um dia");

    let total = 0;
    let desc = "";

    if(kasseien.checked){
        let m = Number(kasseien_m.value || 0);
        total += m * prices.kasseien;
        desc += `${m}m kasseien\n`;
    }

    if(platines.checked){
        let m = Number(platines_m.value || 0);
        total += m * prices.platines;
        desc += `${m}m platines\n`;
    }

    if(mosaic.checked){
        let m = Number(mosaic_m.value || 0);
        total += m * prices.mosaic;
        desc += `${m}m mosaic\n`;
    }

    if(juntas.checked){
        let m = Number(juntas_m.value || 0);
        total += m * prices.juntas;
        desc += `${m}m juntas\n`;
    }

    if(day.checked){
        total += prices.day;
        desc += "day\n";
    }

    if(meio.checked){
        total += prices.meio;
        desc += "meio dia\n";
    }

    data[selectedDay] = {
        local: local.value,
        desc: desc,
        total: total
    };

    localStorage.setItem("workData", JSON.stringify(data));

    calculateTotal();
    generateCalendar();
}

// TOTAL
function calculateTotal(){
    let sum = 0;
    Object.values(data).forEach(d=>sum+=d.total);
    document.getElementById("total").innerText = sum;
}

// PDF
function exportPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let y = 10;
    let total = 0;

    for(let day in data){
        let d = data[day];

        doc.text(`Day ${day} - ${d.local} - €${d.total}`, 10, y);
        y+=7;

        total += d.total;
    }

    y+=10;
    doc.text(`TOTAL = €${total}`, 10, y);

    doc.save("hellwork.pdf");
}

// INIT
generateCalendar();
calculateTotal();

</script>

</body>
</html>
