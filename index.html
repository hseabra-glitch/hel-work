<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">
<title>Hell Work</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
}

h1{text-align:center;}

.container{padding:15px;}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px 0;
}

/* CALENDÁRIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
margin-top:10px;
}

.day{
background:#222;
padding:15px;
border-radius:10px;
text-align:center;
}

.day.has{background:#00c853;}
.day.active{background:#0a84ff;}

.total{
font-size:20px;
margin:10px 0;
}

/* BOTÕES */
button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
}

.add{background:#00c853;}
.pdf{background:#2962ff;}
.save{background:#ff9500;}

/* LISTA */
.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

.controls{
display:flex;
gap:5px;
}

.controls button{
width:30px;
height:30px;
}

input{
padding:8px;
border-radius:8px;
border:none;
width:70px;
}
</style>
</head>

<body>

<h1>🔥 Hell Work</h1>

<!-- MAIN -->
<div class="container" id="main">

<select id="mes">
<option value="0">Janeiro</option>
<option value="1">Fevereiro</option>
<option value="2">Março</option>
<option value="3">Abril</option>
<option value="4">Maio</option>
<option value="5">Junho</option>
<option value="6">Julho</option>
<option value="7">Agosto</option>
<option value="8">Setembro</option>
<option value="9">Outubro</option>
<option value="10">Novembro</option>
<option value="11">Dezembro</option>
</select>

<div class="total">💰 Total: €<span id="total">0</span></div>

<div class="calendar" id="calendar"></div>

<button class="pdf" onclick="exportPDF()">📄 Exportar PDF</button>

</div>

<!-- ADD -->
<div class="container" id="add" style="display:none;">

<input id="local" placeholder="Local">

<div id="lista"></div>

<button class="add" onclick="guardarDia()">Guardar</button>

</div>

<!-- SETTINGS -->
<div class="container" id="settings" style="display:none;">

<div id="precos"></div>

<button class="save" onclick="guardarPrecos()">Guardar preços</button>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('main')">📅</button>
<button onclick="show('add')">➕</button>
<button onclick="show('settings')">⚙️</button>
</div>

<script>

/* ===== DADOS ===== */
let precos = JSON.parse(localStorage.getItem("precos")) || {
k:6.5,
p:7.5,
m:9,
j:49,
d:220,
md:110
};

let dados = JSON.parse(localStorage.getItem("dados")) || {};

let tipos = [
{id:"k", nome:"Kasseien", metros:true},
{id:"p", nome:"Platines", metros:true},
{id:"m", nome:"Mosaic", metros:true},
{id:"j", nome:"Juntas", metros:true},
{id:"d", nome:"Day"},
{id:"md", nome:"Meio dia"}
];

let diaSelecionado=null;

/* ===== UI ===== */
function show(id){
document.getElementById("main").style.display="none";
document.getElementById("add").style.display="none";
document.getElementById("settings").style.display="none";
document.getElementById(id).style.display="block";
}

/* ===== CALENDÁRIO ===== */
function diasNoMes(mes){
const dias=[31,28,31,30,31,30,31,31,30,31,30,31];
return dias[mes];
}

function gerarCalendario(){
let cal=document.getElementById("calendar");
cal.innerHTML="";

let mes=parseInt(document.getElementById("mes").value);
let totalDias=diasNoMes(mes);

for(let i=1;i<=totalDias;i++){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

let chave=mes+"-"+i;

if(dados[chave]) d.classList.add("has");

d.onclick=()=>{
diaSelecionado=chave;
show("add");
};

cal.appendChild(d);
}
}

/* ===== TOTAL ===== */
function atualizarTotal(){
let t=0;
let mes=parseInt(document.getElementById("mes").value);

Object.keys(dados).forEach(k=>{
if(k.startsWith(mes+"-")){
t+=dados[k];
}
});

document.getElementById("total").innerText=t.toFixed(2);
}

/* ===== LISTA ===== */
function gerarLista(){
let div=document.getElementById("lista");
div.innerHTML="";

tipos.forEach(t=>{
let el=document.createElement("div");
el.className="item";

el.innerHTML=`
<label>
<input type="checkbox" id="${t.id}">
${t.nome}
</label>

<div class="controls">
${t.metros ? `<input id="${t.id}_m" placeholder="m">` : ""}
<button onclick="menos('${t.id}')">-</button>
<button onclick="mais('${t.id}')">+</button>
</div>
`;

div.appendChild(el);
});
}

/* ===== PREÇOS ===== */
function gerarPrecos(){
let div=document.getElementById("precos");
div.innerHTML="";

tipos.forEach(t=>{
let el=document.createElement("div");
el.className="item";

el.innerHTML=`
<span>${t.nome}</span>
<div class="controls">
<button onclick="alt('${t.id}',-1)">-</button>
<input id="pre_${t.id}" value="${precos[t.id]}">
<button onclick="alt('${t.id}',1)">+</button>
</div>
`;

div.appendChild(el);
});
}

function alt(id,v){
let i=document.getElementById("pre_"+id);
i.value=parseFloat(i.value||0)+v;
}

function guardarPrecos(){
tipos.forEach(t=>{
precos[t.id]=parseFloat(document.getElementById("pre_"+t.id).value)||0;
});
localStorage.setItem("precos",JSON.stringify(precos));
alert("Guardado");
}

/* ===== MAIS/MENOS ===== */
function mais(id){
let i=document.getElementById(id+"_m");
if(i) i.value=(parseInt(i.value||0)+1);
}

function menos(id){
let i=document.getElementById(id+"_m");
if(i) i.value=Math.max(0,(parseInt(i.value||0)-1));
}

/* ===== GUARDAR DIA ===== */
function guardarDia(){
let total=0;

tipos.forEach(t=>{
if(document.getElementById(t.id).checked){

if(t.metros){
let m=parseFloat(document.getElementById(t.id+"_m").value)||0;
total+=m*precos[t.id];
}else{
total+=precos[t.id];
}

}
});

dados[diaSelecionado]=total;
localStorage.setItem("dados",JSON.stringify(dados));

show("main");
gerarCalendario();
atualizarTotal();
}

/* ===== PDF ===== */
function exportPDF(){
let txt="Resumo:\n";
Object.keys(dados).forEach(d=>{
txt+="Dia "+d+" - €"+dados[d]+"\n";
});

let blob=new Blob([txt],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="relatorio.txt";
a.click();
}

/* ===== EVENTOS ===== */
document.getElementById("mes").addEventListener("change",()=>{
gerarCalendario();
atualizarTotal();
});

/* ===== INIT ===== */
gerarCalendario();
gerarLista();
gerarPrecos();
atualizarTotal();

</script>

</body>
</html>
