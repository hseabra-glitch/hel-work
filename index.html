<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work 🔥</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:10px;
}

/* HEADER */
h2{text-align:center;}

/* SELECT + INPUT */
select,input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

/* BOTÕES */
button{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.add{background:#00c853;}
.pdf{background:#2962ff;}

/* 🔥 CALENDÁRIO FIXO NO TOPO */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin:10px 0;
}

.day{
  background:#222;
  padding:12px 0;
  text-align:center;
  border-radius:10px;
}

.day.done{background:#0f3d4c;}
.day.selected{background:#f4c7a1;color:#000;}

/* FORM COMPACTO */
.block{
  margin-bottom:8px;
}

.checkbox{
  margin-top:8px;
}

/* LISTA */
.item{
  background:#222;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.delete{background:red;}
</style>
</head>

<body>

<h2>🔥 Hell Work</h2>

<select id="mes">
<option>Janeiro</option><option>Fevereiro</option><option>Março</option>
<option>Abril</option><option>Maio</option><option>Junho</option>
<option>Julho</option><option>Agosto</option><option>Setembro</option>
<option>Outubro</option><option>Novembro</option><option>Dezembro</option>
</select>

<!-- 🔥 CALENDÁRIO -->
<div class="calendar" id="calendar"></div>

<input id="local" placeholder="Local">

<div class="block">
<label><input type="checkbox" id="kasseien"> Kasseien</label>
<input id="k_m" placeholder="metros">
</div>

<div class="block">
<label><input type="checkbox" id="platines"> Platines</label>
<input id="p_m" placeholder="metros">
</div>

<div class="block">
<label><input type="checkbox" id="mosaic"> Mosaic</label>
<input id="m_m" placeholder="metros">
</div>

<label class="checkbox"><input type="checkbox" id="juntas"> Juntas</label>
<label class="checkbox"><input type="checkbox" id="day"> Day</label>
<label class="checkbox"><input type="checkbox" id="meio"> Meio dia</label>

<button class="add" onclick="add()">➕ Adicionar</button>
<button class="pdf" onclick="pdf()">📄 Exportar PDF</button>

<div id="list"></div>

<h3 id="total">💰 Total: €0</h3>

<script>
let dia=null;
let dados=JSON.parse(localStorage.getItem("dados")||"[]");

let precos={
k:7.5,
p:7.5,
m:9,
j:20,
d:220,
h:110
};

function gerar(){
calendar.innerHTML="";

for(let i=1;i<=31;i++){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

if(dados.some(x=>x.dia===i && x.mes===mes.value)){
d.classList.add("done");
}

d.onclick=()=>{
dia=i;
document.querySelectorAll(".day").forEach(x=>x.classList.remove("selected"));
d.classList.add("selected");
};

calendar.appendChild(d);
}
}

mes.onchange=gerar;

function add(){
if(!dia)return alert("Escolhe dia");

let total=0;
let desc=[];

if(kasseien.checked){
let mtr=+k_m.value||0;
total+=mtr*precos.k;
desc.push(`Kasseien ${mtr}m`);
}

if(platines.checked){
let mtr=+p_m.value||0;
total+=mtr*precos.p;
desc.push(`Platines ${mtr}m`);
}

if(mosaic.checked){
let mtr=+m_m.value||0;
total+=mtr*precos.m;
desc.push(`Mosaic ${mtr}m`);
}

if(juntas.checked){
total+=precos.j;
desc.push("Juntas");
}

if(day.checked){
total+=precos.d;
desc.push("Day");
}

if(meio.checked){
total+=precos.h;
desc.push("Meio dia");
}

dados.push({mes:mes.value,dia,desc:desc.join(" + "),valor:total});

localStorage.setItem("dados",JSON.stringify(dados));

gerar();
render();
}

function render(){
list.innerHTML="";
let t=0;

dados.forEach((d,i)=>{
t+=d.valor;
list.innerHTML+=`
<div class="item">
${d.mes} - Dia ${d.dia}<br>
${d.desc}<br>
€${d.valor.toFixed(2)}
<button class="delete" onclick="del(${i})">Apagar</button>
</div>`;
});

total.innerText="💰 Total: €"+t.toFixed(2);
}

function del(i){
dados.splice(i,1);
localStorage.setItem("dados",JSON.stringify(dados));
gerar();
render();
}

function pdf(){
let txt="";
let t=0;

dados.forEach(d=>{
txt+=`${d.mes} Dia ${d.dia} - ${d.desc} - €${d.valor}\n`;
t+=d.valor;
});

txt+=`\nTotal: €${t}`;

let w=window.open();
w.document.write("<pre>"+txt+"</pre>");
w.print();
}

gerar();
render();
</script>

</body>
</html>
