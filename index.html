<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hell Work 🔥</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:10px;
}

h2{text-align:center;}

select,input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
  font-weight:bold;
}

.add{background:#00c853;color:#fff;}
.pdf{background:#2962ff;color:#fff;}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  background:#222;
  padding:12px 0;
  text-align:center;
  border-radius:10px;
}

.day.done{background:#0f3d4c;}
.day.selected{background:#f4c7a1;color:#000;}

.item{
  background:#222;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.delete{background:red;}

#settings div{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:5px 0;
}

#settings input{
  width:70px;
  text-align:center;
}

#settings button{
  width:40px;
  padding:8px;
}
</style>
</head>

<body>

<h2>🔥 Hell Work</h2>

<button onclick="toggleSettings()">⚙️ Preços</button>

<div id="settings" style="display:none;">

<div>Kasseien <button onclick="change('k',-0.5)">➖</button><input id="k"><button onclick="change('k',0.5)">➕</button></div>
<div>Platines <button onclick="change('p',-0.5)">➖</button><input id="p"><button onclick="change('p',0.5)">➕</button></div>
<div>Mosaic <button onclick="change('m',-0.5)">➖</button><input id="m"><button onclick="change('m',0.5)">➕</button></div>
<div>Juntas <button onclick="change('j',-1)">➖</button><input id="j"><button onclick="change('j',1)">➕</button></div>
<div>Day <button onclick="change('d',-5)">➖</button><input id="d"><button onclick="change('d',5)">➕</button></div>
<div>Meio dia <button onclick="change('h',-5)">➖</button><input id="h"><button onclick="change('h',5)">➕</button></div>

<button onclick="savePrices()">Guardar</button>

</div>

<select id="mes">
<option>Janeiro</option><option>Fevereiro</option><option>Março</option>
<option>Abril</option><option>Maio</option><option>Junho</option>
<option>Julho</option><option>Agosto</option><option>Setembro</option>
<option>Outubro</option><option>Novembro</option><option>Dezembro</option>
</select>

<div class="calendar" id="calendar"></div>

<input id="local" placeholder="Local">

<label><input type="checkbox" value="k"> Kasseien</label>
<input id="k_m" placeholder="metros">

<label><input type="checkbox" value="p"> Platines</label>
<input id="p_m" placeholder="metros">

<label><input type="checkbox" value="m"> Mosaic</label>
<input id="m_m" placeholder="metros">

<label><input type="checkbox" value="j"> Juntas</label>
<label><input type="checkbox" value="d"> Day</label>
<label><input type="checkbox" value="h"> Meio dia</label>

<button class="add" onclick="add()">➕ Adicionar</button>
<button class="pdf" onclick="pdf()">📄 Exportar PDF</button>

<div id="list"></div>

<h3 id="total">💰 Total: €0</h3>

<script>
let dia=null;
let dados=JSON.parse(localStorage.getItem("dados")||"[]");
let precos=JSON.parse(localStorage.getItem("precos")||{
k:7.5,p:7.5,m:9,j:20,d:220,h:110
});

// 🔥 carregar valores nos inputs
function loadPrices(){
k.value=precos.k;
p.value=precos.p;
m.value=precos.m;
j.value=precos.j;
d.value=precos.d;
h.value=precos.h;
}

function toggleSettings(){
let s=document.getElementById("settings");
s.style.display=s.style.display==="none"?"block":"none";
}

function change(id,val){
let el=document.getElementById(id);
let n=parseFloat(el.value)||0;
n+=val;
if(n<0)n=0;
el.value=n.toFixed(2);
}

function savePrices(){
precos={
k:+k.value,p:+p.value,m:+m.value,j:+j.value,d:+d.value,h:+h.value
};
localStorage.setItem("precos",JSON.stringify(precos));
alert("Guardado");
}

function gerar(){
let c=document.getElementById("calendar");
c.innerHTML="";

for(let i=1;i<=31;i++){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

let tem = dados.some(x => x.dia===i && x.mes===mes.value);
if(tem) d.classList.add("done");

d.onclick=()=>{dia=i;selecionar();};

c.appendChild(d);
}
}

function selecionar(){
document.querySelectorAll(".day").forEach(d=>d.classList.remove("selected"));
document.querySelectorAll(".day")[dia-1].classList.add("selected");
}

mes.onchange=gerar;

function add(){
if(!dia)return alert("Escolhe dia");

let total=0;
let desc=[];

if(kasseien.checked){
let mtr=+k_m.value||0;
total+=mtr*precos.k;
desc.push(`Kasseien ${mtr}m`);
}

if(platines.checked){
let mtr=+p_m.value||0;
total+=mtr*precos.p;
desc.push(`Platines ${mtr}m`);
}

if(mosaic.checked){
let mtr=+m_m.value||0;
total+=mtr*precos.m;
desc.push(`Mosaic ${mtr}m`);
}

if(juntas.checked){
total+=precos.j;
desc.push("Juntas");
}

if(day.checked){
total+=precos.d;
desc.push("Day");
}

if(meio.checked){
total+=precos.h;
desc.push("Meio dia");
}

dados.push({
mes:mes.value,
dia,
desc:desc.join(" + "),
valor:total
});

localStorage.setItem("dados",JSON.stringify(dados));

gerar();
render();
}

function render(){
let l=document.getElementById("list");
l.innerHTML="";
let t=0;

dados.forEach((d,i)=>{
t+=d.valor;
l.innerHTML+=`
<div class="item">
${d.mes} - Dia ${d.dia}<br>
${d.desc}<br>
€${d.valor.toFixed(2)}
<button class="delete" onclick="del(${i})">Apagar</button>
</div>`;
});

total.innerText="💰 Total: €"+t.toFixed(2);
}

function del(i){
dados.splice(i,1);
localStorage.setItem("dados",JSON.stringify(dados));
gerar();
render();
}

function pdf(){
let txt="";
let t=0;

dados.forEach(d=>{
txt+=`${d.mes} Dia ${d.dia} - ${d.desc} - €${d.valor}\n`;
t+=d.valor;
});

txt+=`\nTotal: €${t}`;

let w=window.open();
w.document.write("<pre>"+txt+"</pre>");
w.print();
}

// corrigir IDs
let kasseien=document.querySelector('input[value="k"]');
let platines=document.querySelector('input[value="p"]');
let mosaic=document.querySelector('input[value="m"]');
let juntas=document.querySelector('input[value="j"]');
let day=document.querySelector('input[value="d"]');
let meio=document.querySelector('input[value="h"]');

loadPrices();
gerar();
render();
</script>

</body>
</html>
