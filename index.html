<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 15px;
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

.add { background: #00c853; color: white; }
.pdf { background: #2962ff; color: white; }

.item {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.total {
  margin-top: 15px;
  font-size: 20px;
  text-align: center;
}
</style>
</head>
<body>
  <h2>🔥 Hell Work</h2>
  <select id="month">
  <option>Janeiro</option>
  <option>Fevereiro</option>
  <option>Março</option>
  <option>Abril</option>
</select>
<input id="local" placeholder="Local">
<input id="meters" placeholder="Metros">
<select id="type">
  <option value="">Tipo</option>
  <option value="cassia">Cassia</option>
  <option value="platines">Platines</option>
  <option value="mosaic">Mosaic</option>
  <option value="day">Day (220€)</option>
</select>
<div id="list"></div>
<div class="total">
💰 Total: € <span id="total">0</span>
</div>
<script>
let data = JSON.parse(localStorage.getItem("work")) || [];

// dias
let daySelect = document.getElementById("day");
for(let i=1;i<=31;i++){
  let o = document.createElement("option");
  o.value=i; o.text=i;
  daySelect.appendChild(o);
}

function getPrice(type){
  if(type==="cassia") return 7.5;
  if(type==="platines") return 7.5;
  if(type==="mosaic") return 9;
  if(type==="day") return 220;
  return 0;
}

function add(){
  let item = {
    month: month.value,
    day: day.value,
    local: local.value,
    meters: parseFloat(meters.value)||0,
    type: type.value
  };

  if(!item.type || !item.local) return;

  item.value = item.type==="day" ? 220 : item.meters*getPrice(item.type);

  data.push(item);
  localStorage.setItem("work", JSON.stringify(data));

  render();

  local.value="";
  meters.value="";
  type.value="";
}

function render(){
  list.innerHTML="";
  let total=0;

  data.forEach(d=>{
    total+=d.value;

    list.innerHTML+=`
    <div class="item">
      <b>${d.month} - Dia ${d.day}</b><br>
      ${d.local} | ${d.meters?d.meters+"m | ":""}${d.type}<br>
      €${d.value.toFixed(2)}
    </div>`;
  });

  document.getElementById("total").innerText=total.toFixed(2);
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();
  let y=10;

  data.forEach(d=>{
    doc.text(`${d.month} Dia ${d.day} - €${d.value.toFixed(2)}`,10,y);
    y+=8;
  });

  doc.save("hell-work.pdf");
}

render();
</script>
</body>
</html>
