<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hell Work</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* HEADER */
h1{
    text-align:center;
    margin:20px 0;
}

/* SCREENS */
.screen{
    display:none;
    padding:15px;
}
.active{
    display:block;
}

/* TOTAL */
.total{
    font-size:24px;
    margin:10px;
}

/* CALENDARIO */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:8px;
    margin-top:10px;
}
.day{
    background:#222;
    padding:15px;
    border-radius:10px;
    text-align:center;
}
.day.activeDay{
    background:#0f5c6e;
}

/* BUTTONS */
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.add{background:#00c853;color:#fff;}
.pdf{background:#2962ff;color:#fff;}
.save{background:#00c853;color:#000;}
.priceSave{background:#ff9800;color:#000;}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#111;
}
.nav div{
    flex:1;
    text-align:center;
    padding:10px;
    font-size:20px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

/* PRICE CONTROL */
.priceRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:10px 0;
}
.priceRow button{
    width:40px;
    height:40px;
}
</style>
</head>

<body>

<h1>🔥 Hell Work</h1>

<!-- ===== SCREEN 1 (CALENDARIO) ===== -->
<div id="home" class="screen active">

<select id="mes">
<option>Janeiro</option>
<option>Fevereiro</option>
</select>

<div class="total">💰 Total: €<span id="total">0</span></div>

<div class="calendar" id="calendar"></div>

<button class="pdf">📄 Exportar PDF</button>

</div>

<!-- ===== SCREEN 2 (ADICIONAR) ===== -->
<div id="add" class="screen">

<input placeholder="Local">

<label><input type="checkbox"> Kasseien</label>
<input placeholder="metros">

<label><input type="checkbox"> Platines</label>
<input placeholder="metros">

<label><input type="checkbox"> Mosaic</label>
<input placeholder="metros">

<label><input type="checkbox"> Juntas</label>

<label><input type="checkbox"> Day</label>

<label><input type="checkbox"> Meio dia</label>

<button class="save">Guardar</button>

</div>

<!-- ===== SCREEN 3 (PREÇOS) ===== -->
<div id="prices" class="screen">

<div class="priceRow">
<span>Kasseien</span>
<button onclick="change('k',-1)">-</button>
<input id="k" value="10">
<button onclick="change('k',1)">+</button>
</div>

<div class="priceRow">
<span>Platines</span>
<button onclick="change('p',-1)">-</button>
<input id="p" value="12">
<button onclick="change('p',1)">+</button>
</div>

<div class="priceRow">
<span>Mosaic</span>
<button onclick="change('m',-1)">-</button>
<input id="m" value="15">
<button onclick="change('m',1)">+</button>
</div>

<div class="priceRow">
<span>Juntas</span>
<button onclick="change('j',-1)">-</button>
<input id="j" value="50">
<button onclick="change('j',1)">+</button>
</div>

<div class="priceRow">
<span>Day</span>
<button onclick="change('d',-1)">-</button>
<input id="d" value="220">
<button onclick="change('d',1)">+</button>
</div>

<div class="priceRow">
<span>Meio dia</span>
<button onclick="change('md',-1)">-</button>
<input id="md" value="110">
<button onclick="change('md',1)">+</button>
</div>

<button class="priceSave">Guardar preços</button>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">📅</div>
<div onclick="show('add')">➕</div>
<div onclick="show('prices')">⚙️</div>
</div>

<script>

/* TROCAR ECRÃ */
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* CALENDARIO */
const cal=document.getElementById("calendar");
for(let i=1;i<=31;i++){
    let d=document.createElement("div");
    d.className="day";
    d.innerText=i;
    d.onclick=()=>d.classList.toggle("activeDay");
    cal.appendChild(d);
}

/* PREÇOS + - */
function change(id,val){
    let el=document.getElementById(id);
    el.value=parseInt(el.value||0)+val;
}

</script>

</body>
</html>
